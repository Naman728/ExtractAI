# Soft-production Compose stack
# Usage: docker compose up --build
# Local hot-reload: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  postgres:
    profiles: ["local-db"]
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: extractai
      POSTGRES_PASSWORD: extractai
      POSTGRES_DB: extractai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U extractai -d extractai"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8100 --workers 2"
    env_file:
      - .env
    environment:
      APP_ENV: production
      DEBUG: "false"
      USE_CELERY: "true"
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      STORAGE_LOCAL_PATH: /data/storage
    ports:
      - "8100:8100"
    volumes:
      - storage_data:/data/storage
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=INFO --concurrency=2
    env_file:
      - .env
    environment:
      APP_ENV: production
      DEBUG: "false"
      USE_CELERY: "true"
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      STORAGE_LOCAL_PATH: /data/storage
    volumes:
      - storage_data:/data/storage
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8100}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8100}
    ports:
      - "3100:3100"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  storage_data:
