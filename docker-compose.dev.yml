# Local development overrides (hot reload + bind mounts)
# docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build

services:
  api:
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8100 --reload"
    environment:
      APP_ENV: development
      DEBUG: "true"
      USE_CELERY: "true"
    volumes:
      - ./backend:/app
      - storage_data:/data/storage

  worker:
    environment:
      APP_ENV: development
      DEBUG: "true"
      USE_CELERY: "true"
    volumes:
      - ./backend:/app
      - storage_data:/data/storage

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
